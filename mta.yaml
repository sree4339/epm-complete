_schema-version: "3.1"
ID: epm-complete
version: 1.0.0
description: "EPM Complete - CAP application with Fiori Elements UI"

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install
        - npx cds build --production

modules:
  # --- Backend service (CAP / Node.js) ---
  - name: epm-complete-srv
    type: nodejs
    path: gen/srv
    parameters:
      memory: 256M
      disk-quota: 512M
    properties:
      NODE_ENV: production
      LOG_LEVEL: info
    build-parameters:
      builder: npm
    requires:
      - name: epm-complete-db
      - name: epm-complete-auth
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # --- Database deployer (HDI container) ---
  - name: epm-complete-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm
    requires:
      - name: epm-complete-db

  # --- Application Router ---
  - name: epm-complete-approuter
    type: approuter.nodejs
    path: app/router
    parameters:
      memory: 256M
      disk-quota: 512M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: epm-complete-auth
    build-parameters:
      builder: npm

resources:
  # --- HANA HDI container (database) ---
  - name: epm-complete-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # --- XSUAA (authentication) ---
  - name: epm-complete-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: epm-complete-${org}-${space}
        tenant-mode: dedicated